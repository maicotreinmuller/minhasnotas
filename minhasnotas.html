<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Notas</title>
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    :root {
      --bg: #0e1117;
      --surface: #141821;
      --surface-2: #1a1f2b;
      --border: #242b38;
      --text: #ffffff;
      --muted: #8a95a8;
      --accent: #2d7ff9;
      --radius: 10px;
      --shadow: 0 6px 20px rgba(0, 0, 0, .4);
      --hbg: #0d0f14ee;
      --mbg: #161b26;
      --ctxbg: #1a1f2b;
      --ibg: #0f1320;
      --bbg: #1a1f2b;
      --ch: #2a3446;
    }

    html.light {
      --bg: #eef1f6;
      --surface: #fff;
      --surface-2: #f2f5f9;
      --border: #cdd5e0;
      --text: #111827;
      --muted: #6b7280;
      --shadow: 0 4px 14px rgba(0, 0, 0, .1);
      --hbg: #fffffff0;
      --mbg: #fff;
      --ctxbg: #fff;
      --ibg: #f2f5f9;
      --bbg: #eef1f6;
      --ch: #cdd5e0;
    }

    html,
    body {
      height: 100%;
      margin: 0;
    }

    body {
      font-family: Segoe UI, system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      transition: background .25s, color .25s;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    .header {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      align-items: flex-end;
      gap: .5rem;
      padding: .45rem .8rem 0;
      background: var(--hbg);
      backdrop-filter: blur(10px) saturate(140%);
      border-bottom: 1px solid var(--border);
    }

    .tabsbar {
      display: flex;
      align-items: flex-end;
      gap: .2rem;
      flex: 1;
      min-width: 0;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .tabsbar::-webkit-scrollbar {
      display: none;
    }

    .tab {
      display: flex;
      align-items: center;
      gap: .3rem;
      padding: .4rem .6rem;
      border-radius: 6px 6px 0 0;
      cursor: pointer;
      background: var(--surface);
      border: 1px solid var(--border);
      border-bottom: none;
      color: var(--text);
      white-space: nowrap;
      font-size: 13px;
      transition: background .15s;
      flex-shrink: 0;
      position: relative;
      font-weight: 600;
      margin-bottom: -1px;
    }

    .tab:hover {
      background: var(--surface-2);
    }

    .tab.active {
      background: var(--hbg);
      border-color: var(--border);
      border-bottom-color: var(--hbg);
      z-index: 2;
    }

    .tab .label {
      flex: 1;
    }

    .tab.drag-over {
      outline: 2px dashed var(--accent);
      outline-offset: 2px;
    }

    .tab-color-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-left: .3rem;
      flex-shrink: 0;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: .35rem;
      margin-left: auto;
      flex-shrink: 0;
      padding-bottom: .45rem;
    }

    .iconbtn {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--ch);
      border-radius: 8px;
      background: var(--bbg);
      color: var(--muted);
      cursor: pointer;
      transition: border-color .15s, color .15s;
      flex-shrink: 0;
    }

    .iconbtn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .iconbtn.active {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(45,127,249,.12);
    }

    /* ── Toolbar icon buttons inside table card: borderless, minimal ── */
    .thead-actions .iconbtn {
      border: none;
      background: none;
      border-radius: 5px;
      width: 26px;
      height: 26px;
      color: var(--muted);
      transition: background .13s, color .13s;
    }
    .thead-actions .iconbtn:hover {
      border: none;
      background: var(--ibg);
      color: var(--text);
    }
    .thead-actions .iconbtn.active {
      border: none;
      background: rgba(45,127,249,.15);
      color: var(--accent);
    }

    /* ── Toolbar search input ── */
    .tbl-search-inp {
      width: 0; opacity: 0; padding: 0; pointer-events: none;
      border: 1px solid var(--border); border-radius: 5px;
      background: var(--ibg); color: var(--text);
      font-size: 12px; height: 26px; outline: none;
      transition: width .2s, opacity .2s, padding .2s;
      box-sizing: border-box;
    }
    .tbl-search-inp::placeholder { color: var(--muted); }
    .tbl-search-inp:focus { border-color: var(--accent); }

    /* ── Table card light theme (scoped — does NOT affect page bg or nav) ── */
    .table-card.tbl-light {
      --surface: #fff;
      --surface-2: #f2f5f9;
      --border: #cdd5e0;
      --text: #111827;
      --muted: #6b7280;
      --ibg: #f2f5f9;
      --bbg: #eef1f6;
      --ch: #cdd5e0;
      --accent: #2d7ff9;
    }
    .table-card.tbl-light,
    .table-card.tbl-light .table-card-head,
    .table-card.tbl-light .tbl-wrap,
    .table-card.tbl-light .table-footer {
      background: #fff;
      color: #111827;
    }
    .table-card.tbl-light .table-card-head {
      background: #f2f5f9;
    }
    .table-card.tbl-light .table-footer {
      background: #f2f5f9;
    }
    .table-card.tbl-light .tbl th {
      background: #f2f5f9;
      color: #6b7280;
    }
    .table-card.tbl-light .tbl td input.cell-input,
    .table-card.tbl-light .tbl td select.cell-dropdown,
    .table-card.tbl-light .tbl td input.cell-date-input {
      color: #111827;
    }
    .table-card.tbl-light .tbl .row-num {
      background: #f2f5f9;
      color: #6b7280;
    }

    .iconbtn svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.8;
    }

    .iconbtn i {
      font-size: 16px;
      line-height: 1;
    }

    /* ── MAIN ── */
    main {
      padding: clamp(.6rem, 1.2vw, 1.1rem);
      width: 100%;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    /* ── EMPTY WORKSPACE ── */
    .empty-workspace {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 6rem 1rem;
      gap: 1.5rem;
      text-align: center;
      min-height: calc(100vh - 200px);
    }

    .ew-title {
      font-size: 23px;
      font-weight: 700;
    }

    .ew-sub {
      font-size: 14px;
      color: var(--muted);
      max-width: 360px;
      line-height: 1.6;
    }

    /* ── NOTES GRID ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
      gap: clamp(.5rem, 1vw, .9rem);
      align-items: start;
      align-content: start;
      flex: 1;
    }

    .empty-tab {
      opacity: .55;
      font-size: 13px;
      padding: 2rem 0;
    }

    .notes-page {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
    }

    .notes-footer {
      display: flex;
      align-items: center;
      gap: .5rem;
      padding: .45rem .8rem;
      background: var(--hbg);
      backdrop-filter: blur(10px) saturate(140%);
      border-top: 1px solid var(--border);
      font-size: 13px;
      color: var(--muted);
      flex-shrink: 0;
      margin: clamp(.6rem, 1.2vw, 1.1rem) calc(-1*clamp(.6rem, 1.2vw, 1.1rem)) calc(-1*clamp(.6rem, 1.2vw, 1.1rem));
    }

    .notes-footer-count {
      font-weight: 600;
      color: var(--text);
    }

    /* ── NOTE CARD ── */
    .card {
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: .7rem;
      display: flex;
      flex-direction: column;
      gap: .5rem;
      box-shadow: var(--shadow);
      cursor: grab;
      user-select: none;
      transition: transform .15s, box-shadow .15s, opacity .15s;
      position: relative;
    }

    .card:active {
      cursor: grabbing;
    }

    .card.dragging {
      opacity: .35;
      transform: scale(.95);
    }

    .card.drag-over-card {
      outline: 2px dashed #fff;
      outline-offset: 3px;
    }

    /* DEFAULT — usa vars de tema automaticamente */
    .card[data-color="default"] {
      background: var(--surface);
      border-color: var(--border);
    }

    .card[data-color="default"] h3 {
      color: var(--text);
    }

    .card[data-color="default"] .descricao {
      background: var(--surface-2);
      border-color: var(--ch);
      color: var(--text);
    }

    .card[data-color="default"] .iconbtn {
      border-color: var(--ch);
      background: var(--bbg);
      color: var(--muted);
    }

    .card[data-color="default"] .iconbtn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* Colored cards — text & icon unificados */
    .card:not([data-color="default"]) h3 {
      color: #fff;
    }

    .card:not([data-color="default"]) .descricao {
      color: #fff;
    }

    .card:not([data-color="default"]) .iconbtn {
      border-color: rgba(255, 255, 255, .3);
      background: rgba(0, 0, 0, .2);
      color: rgba(255, 255, 255, .75);
    }

    .card:not([data-color="default"]) .iconbtn:hover {
      border-color: #fff;
      color: #fff;
    }

    html.light .card:not([data-color="default"]) h3 {
      color: #fff;
    }

    html.light .card:not([data-color="default"]) .descricao {
      color: #fff;
    }

    /* BLUE */
    .card[data-color="blue"] {
      background: #1a3f78;
      border-color: #2d6be4;
    }

    .card[data-color="blue"] .descricao {
      background: #163469;
      border-color: #2558c0;
    }

    html.light .card[data-color="blue"] {
      background: #2563eb;
      border-color: #1d4ed8;
    }

    html.light .card[data-color="blue"] .descricao {
      background: #1d58d8;
      border-color: #1749c0;
    }

    /* GREEN */
    .card[data-color="green"] {
      background: #0f3d20;
      border-color: #22a04a;
    }

    .card[data-color="green"] .descricao {
      background: #0b3219;
      border-color: #1a8040;
    }

    html.light .card[data-color="green"] {
      background: #16a34a;
      border-color: #15803d;
    }

    html.light .card[data-color="green"] .descricao {
      background: #15913f;
      border-color: #126e35;
    }

    /* YELLOW */
    .card[data-color="yellow"] {
      background: #4a3800;
      border-color: #c89600;
    }

    .card[data-color="yellow"] .descricao {
      background: #3d2e00;
      border-color: #a07800;
    }

    html.light .card[data-color="yellow"] {
      background: #d97706;
      border-color: #b45309;
    }

    html.light .card[data-color="yellow"] .descricao {
      background: #c46a04;
      border-color: #9c4a02;
    }

    /* RED */
    .card[data-color="red"] {
      background: #4a0f18;
      border-color: #e03040;
    }

    .card[data-color="red"] .descricao {
      background: #3d0b13;
      border-color: #c02030;
    }

    html.light .card[data-color="red"] {
      background: #dc2626;
      border-color: #b91c1c;
    }

    html.light .card[data-color="red"] .descricao {
      background: #c91e1e;
      border-color: #a81818;
    }

    /* PURPLE */
    .card[data-color="purple"] {
      background: #2d0f4a;
      border-color: #9333e8;
    }

    .card[data-color="purple"] .descricao {
      background: #240c3d;
      border-color: #7a28cc;
    }

    html.light .card[data-color="purple"] {
      background: #9333ea;
      border-color: #7e22ce;
    }

    html.light .card[data-color="purple"] .descricao {
      background: #8320d6;
      border-color: #6e1ab8;
    }

    /* ORANGE */
    .card[data-color="orange"] {
      background: #4a2000;
      border-color: #e06010;
    }

    .card[data-color="orange"] .descricao {
      background: #3d1a00;
      border-color: #c04e0c;
    }

    html.light .card[data-color="orange"] {
      background: #ea580c;
      border-color: #c2440a;
    }

    html.light .card[data-color="orange"] .descricao {
      background: #d44e08;
      border-color: #b83e06;
    }

    /* PINK */
    .card[data-color="pink"] {
      background: #4a0f38;
      border-color: #e030a0;
    }

    .card[data-color="pink"] .descricao {
      background: #3d0b2e;
      border-color: #c02080;
    }

    html.light .card[data-color="pink"] {
      background: #db2777;
      border-color: #be185d;
    }

    html.light .card[data-color="pink"] .descricao {
      background: #c82068;
      border-color: #a81458;
    }

    /* TEAL */
    .card[data-color="teal"] {
      background: #0f3840;
      border-color: #0d9488;
    }

    .card[data-color="teal"] .descricao {
      background: #0b2e35;
      border-color: #0a7870;
    }

    html.light .card[data-color="teal"] {
      background: #0d9488;
      border-color: #0f766e;
    }

    html.light .card[data-color="teal"] .descricao {
      background: #0b8278;
      border-color: #096e64;
    }

    .card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: .35rem;
    }

    .titlewrap {
      display: flex;
      align-items: center;
      gap: .4rem;
      flex: 1;
      min-width: 0;
    }

    .card h3 {
      margin: 0;
      font-size: 13.5px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .descricao {
      white-space: pre-wrap;
      border-radius: 7px;
      padding: .6rem;
      font-size: 13px;
      border: 1px solid var(--ch);
      line-height: 1.5;
      word-break: break-word;
      overflow-wrap: anywhere;
    }


    /* ── TRASH BUTTON / LIXEIRA ── */
    .iconbtn.trash-btn { position: relative; }
    .trash-badge {
      position: absolute; top: -4px; right: -4px;
      background: #ef4444; color: #fff;
      font-size: 9px; font-weight: 700;
      min-width: 14px; height: 14px; border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      padding: 0 3px; pointer-events: none; line-height: 1;
    }
    /* ── CUT CELLS (dashed border like Excel) ── */
    .tbl td.cell-cut {
      outline: 2px dashed #f59e0b !important;
      outline-offset: -2px;
      background: rgba(245,158,11,.08) !important;
    }

    /* ── TABLE CARD ── */
    .table-card {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      background: var(--surface);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .table-card[data-tcolor]:not([data-tcolor="default"]) {
      border-top-width: 3px;
    }

    .table-card[data-tcolor="blue"] {
      border-top-color: #2d7ff9;
    }

    .table-card[data-tcolor="green"] {
      border-top-color: #16a34a;
    }

    .table-card[data-tcolor="yellow"] {
      border-top-color: #f59e0b;
    }

    .table-card[data-tcolor="red"] {
      border-top-color: #dc2626;
    }

    .table-card[data-tcolor="purple"] {
      border-top-color: #9333ea;
    }

    .table-card[data-tcolor="orange"] {
      border-top-color: #ea580c;
    }

    .table-card[data-tcolor="pink"] {
      border-top-color: #db2777;
    }

    .table-card[data-tcolor="teal"] {
      border-top-color: #0d9488;
    }

    .table-card-head {
      display: flex;
      align-items: center;
      gap: .75rem;
      padding: .55rem .75rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface-2);
      flex-wrap: wrap;
    }

    .table-card-head h3 {
      margin: 0;
      font-size: 13.5px;
      font-weight: 700;
      flex: 1;
      min-width: 0;
      cursor: pointer;
    }

    .table-card-head h3:hover {
      opacity: .8;
    }

    .thead-actions {
      display: flex;
      align-items: center;
      gap: .25rem;
      flex: 1;
      flex-wrap: nowrap;
      overflow: hidden;
    }

    .tbl-wrap {
      overflow-x: auto;
      position: relative;
    }

    .tbl-wrap::-webkit-scrollbar {
      height: 6px;
      width: 6px;
    }

    .tbl-wrap::-webkit-scrollbar-track {
      background: transparent;
    }

    .tbl-wrap::-webkit-scrollbar-thumb {
      background: rgba(150, 150, 150, 0.3);
      border-radius: 3px;
    }

    .tbl-wrap::-webkit-scrollbar-thumb:hover {
      background: rgba(150, 150, 150, 0.5);
    }

    .tbl {
      width: max-content;
      border-collapse: collapse;
      font-size: 13px;
      table-layout: fixed;
    }

    .tbl th,
    .tbl td {
      border: 1px solid var(--border);
      padding: 0;
      position: relative;
    }

    .tbl th {
      background: var(--surface-2);
      color: var(--muted);
      font-weight: 600;
      font-size: 12px;
      min-width: 110px;
      user-select: none;
    }

    .tbl th .resizer {
      position: absolute;
      right: 0;
      top: 0;
      bottom: 0;
      width: 5px;
      cursor: col-resize;
      user-select: none;
      z-index: 10;
    }

    .tbl th .resizer:hover,
    .tbl th .resizer.resizing {
      background: var(--accent);
    }

    .tbl th .th-inner {
      display: flex;
      align-items: center;
      padding: .4rem .55rem;
      gap: .3rem;
      cursor: pointer;
      user-select: none;
    }

    /* Column drag handle strip — sits on top of TH, mirrors rnum-drag on rows */
    .tbl th {
      position: relative;
    }
    .tbl th .th-drag {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 8px;
      cursor: grab;
      display: flex;
      align-items: center;
      justify-content: center;
      color: transparent;
      font-size: 8px;
      letter-spacing: -1px;
      border-bottom: 1px solid transparent;
      transition: color .15s, background .15s, border-color .15s;
      z-index: 2;
    }
    .tbl th:hover .th-drag {
      color: var(--muted);
      background: rgba(45,127,249,.07);
      border-bottom-color: var(--border);
    }
    .tbl th .th-drag:active { cursor: grabbing; }
    .tbl th.col-selected .th-drag {
      color: var(--accent);
      background: rgba(45,127,249,.18);
      border-bottom-color: rgba(45,127,249,.4);
    }

    .tbl th .th-lbl {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .sort-icon {
      display: none;
    }

    /* th-edit removed — columns are not editable */

    .tbl td input.cell-input {
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 13px;
      padding: .38rem .55rem;
      display: block;
    }

    .tbl td input.cell-input:focus {
      background: rgba(45, 127, 249, .07);
    }

    .add-row-th {
      display: none;
    }

    .tbl .add-col-th {
      display: none;
    }

    .tbl .row-num,
    .tbl .row-num-th {
      width: 48px;
      min-width: 48px;
      max-width: 48px;
      text-align: right;
      background: var(--surface-2);
    }

    .tbl .row-num {
      color: var(--muted);
      font-size: 11px;
      user-select: none;
      padding: 0;
      cursor: pointer;
      position: relative;
    }

    /* Left drag-handle strip — grab cursor */
    .tbl .row-num .rnum-drag {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 14px;
      cursor: grab;
      display: flex;
      align-items: center;
      justify-content: center;
      color: transparent;
      font-size: 10px;
      border-right: 1px solid var(--border);
      transition: color .15s, background .15s;
      border-radius: 3px 0 0 3px;
    }
    .tbl .row-num:hover .rnum-drag {
      color: var(--muted);
      background: rgba(45,127,249,.07);
    }
    .tbl .row-num .rnum-drag:active { cursor: grabbing; }

    /* Number zone — click to select row */
    .tbl .row-num .rnum-num {
      display: block;
      padding: 0 5px 0 18px;
      line-height: 1;
    }

    .tbl .row-num:hover .rnum-num {
      color: var(--accent);
    }
    .tbl tr.row-selected .row-num .rnum-drag {
      color: var(--accent);
      background: rgba(45,127,249,.18);
    }

    .tbl tr:hover td:not(.row-num) {
      background: rgba(45, 127, 249, .05);
    }

    .row-resizer {

    let state = { abas: [], abaAtiva: null, config: {}, lixeira: [] };

    /* ── UNDO / REDO ── */
    const _undo = [], _redo = [];
    function snapshot() {
      _undo.push(JSON.stringify(state));
      if (_undo.length > 60) _undo.shift();
      _redo.length = 0;
    }
    function undo() {
      if (!_undo.length) { showToast('Nada para desfazer'); return; }
      _redo.push(JSON.stringify(state));
      state = JSON.parse(_undo.pop());
      render(); salvar(); showToast('↩ Desfeito');
    }
    function redo() {
      if (!_redo.length) { showToast('Nada para refazer'); return; }
      _undo.push(JSON.stringify(state));
      state = JSON.parse(_redo.pop());
      render(); salvar(); showToast('↪ Refeito');
    }
    const el = s => document.querySelector(s);
    const uid = () => Math.random().toString(36).slice(2, 9);
    const COLORS = ['default', 'blue', 'green', 'yellow', 'red', 'purple', 'orange', 'pink', 'teal'];
    const CNAMES = { default: 'Padrão', blue: 'Azul', green: 'Verde', yellow: 'Amarelo', red: 'Vermelho', purple: 'Roxo', orange: 'Laranja', pink: 'Rosa', teal: 'Teal' };
    const CDOTS = { default: '#4a5568', blue: '#2563eb', green: '#16a34a', yellow: '#d97706', red: '#dc2626', purple: '#9333ea', orange: '#ea580c', pink: '#db2777', teal: '#0d9488' };

    function getColName(i) { const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'; let name = ''; i++; while (i > 0) { i--; name = letters[i % 26] + name; i = Math.floor(i / 26); } return name; }
    function showToast(msg) { const t = el('#toast'); t.textContent = msg; t.classList.add('show'); clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('show'), 2200); }

    /* THEME */

    /* PERSIST */

    (function () {
      try { const raw = localStorage.getItem('notas-app'); if (raw) { const d = JSON.parse(raw); if (d && Array.isArray(d.abas)) { state = d; if (!state.config) state.config = {}; if (!state.lixeira) state.lixeira = {}; if (!Array.isArray(state.lixeira)) state.lixeira = []; if (!state.abaAtiva && state.abas.length) state.abaAtiva = state.abas[0].id; return; } } } catch (e) { }
      state = { abas: [], abaAtiva: null, config: {} };
    })();
    function getAba(id) { return state.abas.find(a => a.id === id); }

    /* MODAL */
    function openModal(title, bodyNode, footerNodes = []) {
      const bd = el('#backdrop'); bd.innerHTML = '';

      const h = document.createElement('header'); const ht = document.createElement('h2'); ht.textContent = title; h.appendChild(ht);

      const f = document.createElement('div'); f.className = 'footer'; footerNodes.forEach(n => f.appendChild(n));
      m.appendChild(h); m.appendChild(b); m.appendChild(f);

    function closeModal() { const bd = el('#backdrop'); bd.classList.remove('show'); bd.setAttribute('aria-hidden', 'true'); bd.innerHTML = ''; }

    /* CTX MENU */
    const ctx = el('#ctx');
    function openCtx(x, y, items) {
      ctx.innerHTML = '';
      items.forEach(it => {
        if (it.type === 'sep') { const s = document.createElement('div'); s.className = 'ctx-sep'; ctx.appendChild(s); return; }
        if (it.type === 'lbl') { const l = document.createElement('div'); l.className = 'ctx-lbl'; l.textContent = it.text; ctx.appendChild(l); return; }
        if (it.type === 'colors') {
          const row = document.createElement('div'); row.className = 'color-row';
          COLORS.forEach(c => { const sw = document.createElement('div'); sw.className = 'csw' + (it.cur === c ? ' active' : ''); sw.dataset.c = c; sw.title = CNAMES[c]; sw.onclick = ev => { ev.stopPropagation(); it.fn(c); closeCtx(); }; row.appendChild(sw); });
          ctx.appendChild(row); return;
        }
        const b = document.createElement('button'); b.textContent = it.label; if (it.danger) b.classList.add('danger');
        b.onclick = ev => { ev.stopPropagation(); it.fn(); closeCtx(); }; ctx.appendChild(b);
      });
      ctx.style.left = Math.min(Math.max(8, x), window.innerWidth - 212) + 'px';
      ctx.style.top = Math.min(Math.max(8, y), window.innerHeight - 260) + 'px';
      ctx.classList.add('show'); ctx.setAttribute('aria-hidden', 'false');
    }
    function closeCtx() { ctx.classList.remove('show'); ctx.setAttribute('aria-hidden', 'true'); }
    window.addEventListener('click', e => { if (ctx.classList.contains('show') && !ctx.contains(e.target)) closeCtx(); });
    window.addEventListener('keydown', e => { if (e.key === 'Escape') { closeCtx(); closeModal(); } });

    /* TABS */
    function criarAba(tipo = 'notas', nome = 'Nova aba') {
      const isLight = document.documentElement.classList.contains('light');
      const corPadrao = isLight ? 'default' : 'default';
      const aba = {
        id: uid(), nome, tipo, cor: 'default', notas: [], tabelas: [
          { id: uid(), nome: 'Tabela 1', isDefault: true, colunas: Array.from({ length: 26 }).map(() => ({ id: uid(), nome: '' })), linhas: Array.from({ length: 26 }).map(() => Array(26).fill('')), cor: 'default', sort: { col: null, dir: 'asc' }, filter: '', linhasColoridas: {}, linhasFixas: [], colWidths: {} }
        ], tabelaAtivaId: null

      if (tipo === 'tabela') aba.tabelaAtivaId = aba.tabelas[0].id;
      state.abas.push(aba); state.abaAtiva = aba.id; render(); salvar();
    }
    function excluirAba(id) { state.abas = state.abas.filter(a => a.id !== id); if (state.abaAtiva === id) state.abaAtiva = state.abas.length ? state.abas[0].id : null; render(); salvar(); showToast('Aba excluída'); }
    function setAba(id) { state.abaAtiva = id; render(); salvar(); }

    function renderTabs() {
      const bar = el('#tabsbar');
      bar.innerHTML = '';

      state.abas.forEach((aba, idx) => {
        const t = document.createElement('button');
        t.className = 'tab' + (aba.id === state.abaAtiva ? ' active' : '');
        t.onclick = () => setAba(aba.id);
        t.draggable = true;

        t.addEventListener('dragstart', ev => {
          ev.dataTransfer.setData('text/plain', 'tab:' + idx);
          ev.dataTransfer.effectAllowed = 'move';
        });
        t.addEventListener('dragover', ev => { ev.preventDefault(); t.classList.add('drag-over'); });
        t.addEventListener('dragleave', () => t.classList.remove('drag-over'));
        t.addEventListener('drop', ev => {
          ev.preventDefault();
          t.classList.remove('drag-over');
          const raw = ev.dataTransfer.getData('text/plain');
          if (raw.startsWith('tab:')) {
            const from = parseInt(raw.replace('tab:', ''));
            const arr = state.abas.slice();
            const [item] = arr.splice(from, 1);
            arr.splice(idx, 0, item);
            state.abas = arr;

        const lbl = document.createElement('span');

        t.appendChild(lbl);
        t.appendChild(dot);

          ev.preventDefault();

    let dragNoteId = null;
    function buildNoteCard(abaId, nota) {
      const wrap = document.createElement('article');
      wrap.className = 'card'; wrap.dataset.id = nota.id; wrap.dataset.color = nota.cor || 'default';
      wrap.draggable = true;
      wrap.addEventListener('dragstart', ev => { dragNoteId = nota.id; ev.dataTransfer.effectAllowed = 'move'; ev.dataTransfer.setData('text/plain', 'note:' + nota.id); setTimeout(() => wrap.classList.add('dragging'), 0); });
      wrap.addEventListener('dragend', () => { wrap.classList.remove('dragging'); dragNoteId = null; });
      wrap.addEventListener('dragover', ev => { ev.preventDefault(); ev.stopPropagation(); if (dragNoteId && dragNoteId !== nota.id) wrap.classList.add('drag-over-card'); });
      wrap.addEventListener('dragleave', () => wrap.classList.remove('drag-over-card'));
      wrap.addEventListener('drop', ev => {
        ev.preventDefault(); ev.stopPropagation(); wrap.classList.remove('drag-over-card');
        const data = ev.dataTransfer.getData('text/plain'); if (!data.startsWith('note:')) return;
        const srcId = data.replace('note:', ''); if (srcId === nota.id) return;
        const a = getAba(abaId); if (!a) return;
        const si = a.notas.findIndex(x => x.id === srcId); const di = a.notas.findIndex(x => x.id === nota.id);
        if (si < 0 || di < 0) return; const [moved] = a.notas.splice(si, 1); a.notas.splice(di, 0, moved); render(); salvar();
      });

      wrap.addEventListener('contextmenu', ev => {

      head.appendChild(bcopy);

    /* TABLE */
    function getFilteredRows(tabela) {
      const f = (tabela.filter || '').toLowerCase().trim();
      let rows = tabela.linhas.map((r, i) => ({ r, i }));
      if (f) rows = rows.filter(({ r }) => r.some(c => (c || '').toLowerCase().includes(f)));
      if (tabela.sort && tabela.sort.col !== null) {
        const ci = tabela.sort.col; const dir = tabela.sort.dir;
        rows.sort((a, b) => {
          const av = (a.r[ci] || '').toLowerCase(); const bv = (b.r[ci] || '').toLowerCase();
          const n = parseFloat(av) - parseFloat(bv);
          if (!isNaN(n) && av !== '' && bv !== '') return dir === 'asc' ? n : -n;
          return dir === 'asc' ? av.localeCompare(bv, 'pt', { numeric: true }) : bv.localeCompare(av, 'pt', { numeric: true });
        });
      }
      return rows;
    }

    function criarNovaTabela(abaId) {
      const aba = getAba(abaId); if (!aba || aba.tipo !== 'tabela') return;
      const novaTabela = { id: uid(), nome: 'Tabela ' + (aba.tabelas.length + 1), isDefault: false, colunas: Array.from({ length: 26 }).map(() => ({ id: uid(), nome: '' })), linhas: Array.from({ length: 26 }).map(() => Array(26).fill('')), cor: 'default', sort: { col: null, dir: 'asc' }, filter: '', linhasColoridas: {}, linhasFixas: [], colWidths: {}, cellConfig: {}, cellColors: {}, cellStyle: {} };
      aba.tabelas.push(novaTabela);
      aba.tabelaAtivaId = novaTabela.id;
      salvar();
      renderTableArea(aba);
      showToast('Nova tabela criada');
    }

    function duplicarTabela(abaId, tabelaId) {
      const aba = getAba(abaId); if (!aba) return;
      const tabela = aba.tabelas.find(t => t.id === tabelaId); if (!tabela) return;
      const novaCopia = { ...tabela, id: uid(), nome: tabela.nome + ' (cópia)', isDefault: false, linhas: tabela.linhas.map(r => [...r]), linhasColoridas: { ...tabela.linhasColoridas }, linhasFixas: [...tabela.linhasFixas], colunas: tabela.colunas.map(c => ({ ...c, id: uid() })), colWidths: { ...tabela.colWidths } };
      aba.tabelas.push(novaCopia);
      aba.tabelaAtivaId = novaCopia.id;
      salvar();
      renderTableArea(aba);
      showToast('Tabela duplicada');
    }

    function excluirTabela(abaId, tabelaId) {
      const aba = getAba(abaId); if (!aba) return;
      aba.tabelas = aba.tabelas.filter(t => t.id !== tabelaId);
      if (aba.tabelaAtivaId === tabelaId) aba.tabelaAtivaId = aba.tabelas.length ? aba.tabelas[0].id : null;
      salvar();
      renderTableArea(aba);
      showToast('Tabela excluída');
    }

    /* ── FORMAT PAINTER — module-level so renderTblBody can reference it ── */
    let _painterActive = false;
    let _painterStyle = null;
    let _painterTabela = null; // which tabela the painter belongs to
    function applyPainter(table, tabela, ri, ci) {
      if (!_painterActive || !_painterStyle || _painterTabela !== tabela) return;
      snapshot();
      if (!tabela.cellStyle) tabela.cellStyle = {};
      if (!tabela.cellStyle[ri]) tabela.cellStyle[ri] = {};
      tabela.cellStyle[ri][ci] = JSON.parse(JSON.stringify(_painterStyle));
      salvar();
      const trs2 = Array.from(table.querySelectorAll('tbody tr'));
      const tr = trs2[ri]; if (!tr) return;
      const td = tr.querySelectorAll('td:not(.row-num)')[ci]; if (!td) return;
      applyCellStyleTD(td, tabela.cellStyle[ri][ci]);
    }

    function buildTableCard(aba, tabela) {
      if (!tabela.sort) tabela.sort = { col: null, dir: 'asc' };
      if (tabela.filter === undefined) tabela.filter = '';
      if (!tabela.cor) tabela.cor = 'default';
      if (!tabela.linhasColoridas) tabela.linhasColoridas = {};
      if (!tabela.linhasFixas) tabela.linhasFixas = [];
      if (!tabela.colWidths) tabela.colWidths = {};

      const wrap = document.createElement('div'); wrap.className = 'table-card'; wrap.dataset.tcolor = tabela.cor;

      /* head */
      const head = document.createElement('div'); head.className = 'table-card-head';
      const htitle = document.createElement('h3'); htitle.textContent = tabela.nome;
      htitle.ondblclick = ev => {
        ev.stopPropagation();
        abrirModalRenomearTabela(aba.id, tabela.id);
      };
      /* Contextmenu em qualquer parte do card (exceto th de coluna e row-num que têm seu próprio) */
      function openTableCtx(ev) {
        ev.preventDefault(); ev.stopPropagation();
        const items = [
          { label: 'Renomear tabela', fn: () => abrirModalRenomearTabela(aba.id, tabela.id) },
          { label: 'Duplicar tabela', fn: () => duplicarTabela(aba.id, tabela.id) },
          { label: 'Limpar tabela', fn: () => { tabela.linhas = Array.from({ length: 26 }).map(() => tabela.colunas.map(() => '')); tabela.linhasColoridas = {}; tabela.linhasFixas = []; salvar(); renderTableArea(aba); showToast('Tabela limpa'); } },
          { type: 'sep' },
          { label: 'Excluir tabela', danger: true, fn: () => excluirTabela(aba.id, tabela.id) },
          { type: 'sep' },
          { type: 'lbl', text: 'Cor da tabela' },

      function applyStyleToRange(table, tabela, prop, val) {

              delete tabela.cellStyle[ri][ci][prop];

              delete tabela.cellStyle[ri][ci][prop]; // toggle off
            } else {
              tabela.cellStyle[ri][ci][prop] = val;

          }
        }
        salvar();
        // Re-apply styles without full re-render
        const trs = Array.from(table.querySelectorAll('tbody tr'));
        for (let ri = r.r1; ri <= r.r2; ri++) {

      optsContainer.appendChild(optsTitle);

      let currentOptions = JSON.parse(JSON.stringify(config.options || []));
      function renderOpts() {

          row.appendChild(colorBtn); row.appendChild(inp); row.appendChild(delBtn); optsList.appendChild(row);
        });

    function abrirModalConfigurarColuna(abaId, tabelaId, ci) {

    function renderTblHead(table, tabela, aba) {
      let thead = table.querySelector('thead');
      if (!thead) { thead = document.createElement('thead'); table.insertBefore(thead, table.firstChild); }
      thead.innerHTML = '';
      if (tabela._selAll) table.classList.add('all-selected'); else table.classList.remove('all-selected');

      const selAllBtn = document.createElement('div'); selAllBtn.className = 'select-all-btn'; selAllBtn.innerHTML = '◢'; selAllBtn.title = 'Selecionar Todos';
      selAllBtn.onclick = (e) => { e.stopPropagation(); tabela._selAll = !tabela._selAll; renderTblHead(table, tabela, aba); renderTblBody(table, tabela); };
      rnumTh.appendChild(selAllBtn);

      tabela.colunas.forEach((col, ci) => {

        const lbl = document.createElement('span'); lbl.className = 'th-lbl';

        const si = document.createElement('span'); si.className = 'sort-icon';
        si.textContent = tabela.sort && tabela.sort.col === ci ? (tabela.sort.dir === 'asc' ? '▲' : '▼') : '⇅';
        function excluirColuna(ci) {
          if (tabela.colunas.length <= 1) { showToast('A tabela precisa ter ao menos uma coluna'); return; }
          snapshot();
          tabela.colunas.splice(ci, 1);
          tabela.linhas.forEach(r => r.splice(ci, 1));
          // Shift/remove cellConfig entries for deleted column
          if (tabela.cellConfig) {
            Object.keys(tabela.cellConfig).forEach(ri => {
              const row = tabela.cellConfig[ri];
              delete row[ci];
              const shifted = {};
              Object.keys(row).forEach(k => { const ki=parseInt(k); shifted[ki>ci?ki-1:ki]=row[k]; });
              tabela.cellConfig[ri] = shifted;
            });
          }
          // Shift/remove cellColors entries for deleted column
          if (tabela.cellColors) {
            Object.keys(tabela.cellColors).forEach(ri => {
              const row = tabela.cellColors[ri];
              delete row[ci];
              const shifted = {};
              Object.keys(row).forEach(k => { const ki=parseInt(k); shifted[ki>ci?ki-1:ki]=row[k]; });
              tabela.cellColors[ri] = shifted;
            });
          }
          // Shift colConfig
          if (tabela.colConfig) {
            const newCfg = {};
            Object.keys(tabela.colConfig).forEach(k => { const ki=parseInt(k); if (ki===ci) return; newCfg[ki>ci?ki-1:ki]=tabela.colConfig[k]; });
            tabela.colConfig = newCfg;
          }
          if (tabela.sort && tabela.sort.col !== null) {
            if (tabela.sort.col === ci) tabela.sort = { col: null, dir: 'asc' };
            else if (tabela.sort.col > ci) tabela.sort.col--;
          }
          salvar(); renderTblHead(table, tabela, aba); renderTblBody(table, tabela);
        }
        // Sort removed from TH click — use Classificar e Filtrar toolbar button

        // ── Column drag handle strip (mirrors rnum-drag for rows) ──
        const thDrag = document.createElement('span'); thDrag.className = 'th-drag'; thDrag.title = 'Arrastar para mover coluna';
        thDrag.innerHTML = '&#8942;&#8942;'; // ⠿ dots
        thDrag.draggable = true;
        thDrag.addEventListener('dragstart', ev => {
          ev.stopPropagation();
          ev.dataTransfer.setData('col-drag', String(ci)); ev.dataTransfer.effectAllowed = 'move'; th.style.opacity = '.45';
        });
        thDrag.addEventListener('dragend', () => { th.style.opacity = ''; });
        th.appendChild(thDrag);

        // ── Column selection: mousedown on inner label area selects entire column ──
        inner.addEventListener('mousedown', ev => {
          if (ev.target.classList.contains('resizer') || ev.target.classList.contains('th-edit') || ev.target.classList.contains('th-drag')) return;
          if (ev.button !== 0) return;
          ev.stopPropagation();
          selState.tabelaId = tabela.id; selState.mouseDown = true; selState.colSelecting = true; selState.rowSelecting = false;
          selState.anchor = {ri:0, ci}; selState.head = {ri: tabela.linhas.length - 1, ci};
          applySelectionStyles(table, tabela);
          updateFmtBar(table, tabela);
        });
        th.addEventListener('mousemove', () => {
          if (!selState.mouseDown || !selState.colSelecting) return;
          selState.head = {ri: tabela.linhas.length - 1, ci};
          applySelectionStyles(table, tabela);
        });

        /* Column drag-over / drop targets stay on TH */
        th.addEventListener('dragover', ev => {
          if (!ev.dataTransfer.types || !(ev.dataTransfer.types.indexOf ? ev.dataTransfer.types.indexOf('col-drag') >= 0 : ev.dataTransfer.types.includes('col-drag'))) return;
          ev.preventDefault(); ev.stopPropagation(); th.classList.add('col-drag-over');
        });
        th.addEventListener('dragleave', () => th.classList.remove('col-drag-over'));
        th.addEventListener('drop', ev => {
          ev.preventDefault(); ev.stopPropagation(); th.classList.remove('col-drag-over');
          if (th.classList.contains('resizing')) return;
          const fromStr = ev.dataTransfer.getData('col-drag'); if (!fromStr) return;
          const from = parseInt(fromStr); const to = ci; if (from === to || isNaN(from)) return;
          /* Reordenar colunas e dados de cada linha */
          const [movedCol] = tabela.colunas.splice(from, 1); tabela.colunas.splice(to, 0, movedCol);
          tabela.linhas.forEach(r => { const [movedCell] = r.splice(from, 1); r.splice(to, 0, movedCell); });
          /* Ajustar sort col index */
          if (tabela.sort && tabela.sort.col !== null) {
            if (tabela.sort.col === from) tabela.sort.col = to;
            else if (from < to && tabela.sort.col > from && tabela.sort.col <= to) tabela.sort.col--;
            else if (from > to && tabela.sort.col >= to && tabela.sort.col < from) tabela.sort.col++;
          }
          salvar(); renderTblHead(table, tabela, aba); renderTblBody(table, tabela);
        });
        th.addEventListener('contextmenu', ev => {
          ev.preventDefault();
          openCtx(ev.clientX, ev.clientY, [
            { label: 'Configurar coluna (Validação)', fn: () => abrirModalConfigurarColuna(aba.id, tabela.id, ci) },
            { type: 'sep' },
            { label: 'Excluir coluna', danger: true, fn: () => excluirColuna(ci) }

        inner.appendChild(lbl); inner.appendChild(si); th.appendChild(inner);

        let curW = tabela.colWidths && tabela.colWidths[ci] ? tabela.colWidths[ci] : 110;
        th.style.width = curW + 'px';
        th.style.minWidth = curW + 'px';
        const resizer = document.createElement('div'); resizer.className = 'resizer';
        resizer.addEventListener('mousedown', e => {

          resizer.classList.add('resizing');
          function doDrag(ev) {
            let newW = Math.max(50, startW + ev.clientX - startX);
            th.style.width = newW + 'px';
            th.style.minWidth = newW + 'px';

          function stopDrag() {

            if (tabela._selAll) {
              tabela.colunas.forEach((_, cidx) => tabela.colWidths[cidx] = finalW);
            } else {
              tabela.colWidths[ci] = finalW;
            }
            salvar();
            if (tabela._selAll) renderTblHead(table, tabela, aba);
          }
          document.addEventListener('mousemove', doDrag); document.addEventListener('mouseup', stopDrag);
        });
        th.appendChild(resizer);

        hrow.appendChild(th);
      });
      /* add-col-th movido para thead-actions */
      thead.appendChild(hrow);
    }

    /* ── SPREADSHEET SELECTION STATE ── */
    const selState = {
      tabelaId: null,
      anchor: null,
      head: null,
      mouseDown: false,
      rowSelecting: false,
      colSelecting: false,
      copiedData: null,
      copiedFormats: null,
      isCut: false,
      cutSourceId: null,
      cutRange: null,
      // Fill-handle drag state
      filling: false,       // true while dragging the fill handle
      fillAnchor: null,     // {ri,ci} start of fill (anchor cell)
      fillHead: null,       // {ri,ci} current fill end
    };

    // Global mouseup always clears mouseDown
    document.addEventListener('mouseup', () => { selState.mouseDown = false; selState.rowSelecting = false; selState.colSelecting = false; /* filling is handled by the fill mouseup listener above */ });
    function selRange() {
      if (!selState.anchor || !selState.head) return null;
      return {
        r1: Math.min(selState.anchor.ri, selState.head.ri),
        r2: Math.max(selState.anchor.ri, selState.head.ri),
        c1: Math.min(selState.anchor.ci, selState.head.ci),
        c2: Math.max(selState.anchor.ci, selState.head.ci),
      };
    }
    function inRange(ri, ci) {
      const r = selRange(); if (!r) return false;
      return ri >= r.r1 && ri <= r.r2 && ci >= r.c1 && ci <= r.c2;
    }
    function isAnchor(ri, ci) { return selState.anchor && selState.anchor.ri === ri && selState.anchor.ci === ci; }

    function applySelectionStyles(table, tabela) {
      const trs = Array.from(table.querySelectorAll('tbody tr'));
      // Compute fill-preview range
      let fillRange = null;
      if (selState.filling && selState.fillAnchor && selState.fillHead) {
        const fa = selState.fillAnchor; const fh = selState.fillHead;
        fillRange = {
          r1: Math.min(fa.ri, fh.ri), r2: Math.max(fa.ri, fh.ri),
          c1: Math.min(fa.ci, fh.ci), c2: Math.max(fa.ci, fh.ci),
        };
      }
      const r = selRange();
      // Highlight selected column headers
      const ths = Array.from(table.querySelectorAll('thead th:not(.row-num-th)'));
      ths.forEach((th, ci) => {
        const colSelected = r && ci >= r.c1 && ci <= r.c2 && r.r1 === 0 && r.r2 >= tabela.linhas.length - 1;
        th.classList.toggle('col-selected', !!colSelected);
      });
      trs.forEach(tr => {
        const ri = parseInt(tr.dataset.ri);
        const tds = Array.from(tr.querySelectorAll('td:not(.row-num)'));
        tds.forEach((td, ci) => {
          const anchor = isAnchor(ri, ci);
          td.classList.toggle('cell-selected', inRange(ri, ci) && !anchor);
          td.classList.toggle('cell-anchor', anchor);
          // Fill preview (exclude the anchor itself from preview)
          const inFill = fillRange && ri >= fillRange.r1 && ri <= fillRange.r2 && ci >= fillRange.c1 && ci <= fillRange.c2 && !anchor;
          td.classList.toggle('fill-preview', !!inFill);
          // Add fill-handle to anchor cell
          td.querySelectorAll('.fill-handle').forEach(h => h.remove());
          if (anchor) {
            const fh = document.createElement('div'); fh.className = 'fill-handle';
            fh.addEventListener('mousedown', ev => {
              ev.preventDefault(); ev.stopPropagation();
              selState.filling = true;
              selState.fillAnchor = { ri, ci };
              selState.fillHead = { ri, ci };
            });
            td.appendChild(fh);
          }
        });
        const rowSelected = r && ri >= r.r1 && ri <= r.r2 && r.c1 === 0 && r.c2 >= tabela.colunas.length - 1;
        tr.classList.toggle('row-selected', rowSelected);
      });
    }

    // Fill-handle mousemove + mouseup (global)
    document.addEventListener('mousemove', ev => {
      if (!selState.filling) return;
      // Find which TD the mouse is over
      const el2 = document.elementFromPoint(ev.clientX, ev.clientY);
      if (!el2) return;
      const td = el2.closest('td[data-ri][data-ci]');
      if (!td) return;
      const ri = parseInt(td.dataset.ri); const ci = parseInt(td.dataset.ci);
      if (isNaN(ri) || isNaN(ci)) return;
      if (selState.fillHead && selState.fillHead.ri === ri && selState.fillHead.ci === ci) return;
      selState.fillHead = { ri, ci };
      // Find the active table to refresh styles
      const tbl = td.closest('table'); if (!tbl) return;
      const tblId = selState.tabelaId;
      const aba = getAbaAtiva(); if (!aba) return;
      const tabela2 = aba.tabelas ? aba.tabelas.find(t => t.id === tblId) : null; if (!tabela2) return;
      applySelectionStyles(tbl, tabela2);
    });
    document.addEventListener('mouseup', ev => {
      if (!selState.filling) return;
      selState.filling = false;
      const fa = selState.fillAnchor; const fh = selState.fillHead;
      if (!fa || !fh) { selState.fillAnchor = null; selState.fillHead = null; return; }
      // Execute fill: copy anchor cell data+format to all cells in fill range
      const aba = getAbaAtiva(); if (!aba) return;
      const tblId = selState.tabelaId;
      const tabela2 = aba.tabelas ? aba.tabelas.find(t => t.id === tblId) : null; if (!tabela2) return;
      const r1=Math.min(fa.ri,fh.ri), r2=Math.max(fa.ri,fh.ri);
      const c1=Math.min(fa.ci,fh.ci), c2=Math.max(fa.ci,fh.ci);
      const srcVal = tabela2.linhas[fa.ri] ? (tabela2.linhas[fa.ri][fa.ci] || '') : '';
      // Only cell-specific format (not column-wide) — so paste is purely what the source cell has
      const srcFmt = (tabela2.cellConfig && tabela2.cellConfig[fa.ri] && tabela2.cellConfig[fa.ri][fa.ci]) || null;
      snapshot();
      if (!tabela2.cellConfig) tabela2.cellConfig = {};
      for (let ri=r1; ri<=r2; ri++) {
        while (tabela2.linhas.length <= ri) tabela2.linhas.push(tabela2.colunas.map(()=>''));
        for (let ci=c1; ci<=c2; ci++) {
          if (ri === fa.ri && ci === fa.ci) continue; // skip the anchor cell itself
          // Overwrite value unconditionally
          tabela2.linhas[ri][ci] = srcVal;
          // Overwrite cellConfig: apply source format or clear any existing validation
          if (!tabela2.cellConfig[ri]) tabela2.cellConfig[ri] = {};
          if (srcFmt) {
            tabela2.cellConfig[ri][ci] = JSON.parse(JSON.stringify(srcFmt));
          } else {
            delete tabela2.cellConfig[ri][ci];
          }
        }
      }
      selState.fillAnchor = null; selState.fillHead = null;
      salvar();
      // Re-render
      const tbl = document.querySelector('.tbl'); if (!tbl) return;
      renderTblHead(tbl, tabela2, aba); renderTblBody(tbl, tabela2);
      showToast('Preenchido!');
    });

    function clearSelection(table, tabela) {
      selState.anchor = null; selState.head = null;
      applySelectionStyles(table, tabela);
    }

    function deleteSelection(table, tabela) {
      const r = selRange(); if (!r) return;
      if (!tabela.cellConfig) tabela.cellConfig = {};
      for (let ri = r.r1; ri <= r.r2; ri++) {
        if (!tabela.linhas[ri]) continue;
        for (let ci = r.c1; ci <= r.c2; ci++) {
          tabela.linhas[ri][ci] = '';
          // Also clear per-cell validation so the cell is completely free
          if (tabela.cellConfig[ri]) delete tabela.cellConfig[ri][ci];
        }
      }
      salvar();
      renderTblBody(table, tabela);
      showToast('Conteúdo apagado');
    }

    function getSelectedText(table, tabela) {
      const r = selRange(); if (!r) return '';

            // if clicking inside existing selection, keep it; otherwise start new anchor/head
            if (!(selRange() && inRange(ri, ci))) {
              selState.anchor={ri,ci}; selState.head={ri,ci};
            }
            applySelectionStyles(table,tabela);
            updateFmtBar(table, tabela);
          });
          // mousemove on TD = extend selection (only when mouse is held)
          td.addEventListener('mousemove', () => {
            if (!selState.mouseDown||selState.rowSelecting||selState.filling) return;
            if (_painterActive && _painterStyle) {
              applyPainter(table, tabela, ri, ci);
              selState.head={ri,ci}; applySelectionStyles(table,tabela);
              return;
            }
            if (selState.head&&selState.head.ri===ri&&selState.head.ci===ci) return;
            selState.head={ri,ci}; applySelectionStyles(table,tabela);
          });

          // Right-click context menu on cell
          td.addEventListener('contextmenu', ev => {
            ev.preventDefault(); ev.stopPropagation();
            // Ensure this cell is at least selected (if nothing selected, select it)
            if (!selRange() || !inRange(ri, ci)) {
              selState.tabelaId=tabela.id; selState.anchor={ri,ci}; selState.head={ri,ci};
              applySelectionStyles(table,tabela);
            }
            const r = selRange();
            const hasCopied = !!(selState.copiedData);
            // Cell color state (read from linhasColoridas — we'll store cellColors separately)
            const curCellCor = (tabela.cellColors && tabela.cellColors[ri] && tabela.cellColors[ri][ci]) || 'default';
            const CELL_BG = { default:null, blue:'rgba(37,99,235,.28)', green:'rgba(22,163,74,.28)', yellow:'rgba(217,119,6,.28)', red:'rgba(220,38,38,.28)', purple:'rgba(147,51,234,.28)', orange:'rgba(234,88,12,.28)', pink:'rgba(219,39,119,.28)', teal:'rgba(13,148,136,.28)' };
            const items = [];
            if (hasCopied) {
              items.push({ label: 'Colar', fn: () => {
                navigator.clipboard.readText().then(txt => {
                  pasteToSelection(table, tabela, txt.split('\n').map(rw=>rw.split('\t')), true);
                }).catch(() => {
                  if (selState.copiedData) {
                    pasteToSelection(table, tabela, selState.copiedData, true);
                  }
                });
              }});
            }
            items.push({ label: 'Copiar', fn: () => copySelection(table, tabela) });
            items.push({ label: 'Recortar', fn: () => { snapshot(); cutSelection(table, tabela); } });
            items.push({ type: 'sep' });
            items.push({ type: 'lbl', text: 'Cor das células' });
            items.push({ type: 'colors', cur: curCellCor, fn: (cor) => {
              snapshot();
              if (!tabela.cellColors) tabela.cellColors = {};
              if (r) {
                for (let rri=r.r1; rri<=r.r2; rri++) {
                  if (!tabela.cellColors[rri]) tabela.cellColors[rri] = {};
                  for (let rci=r.c1; rci<=r.c2; rci++) {
                    if (cor === 'default') delete tabela.cellColors[rri][rci];
                    else tabela.cellColors[rri][rci] = cor;
                  }
                }
              }
              salvar(); renderTblBody(table, tabela);
            }});
            openCtx(ev.clientX, ev.clientY, items);
          });

          const cellEl = buildCellInput(linha, ri, ci);
          td.appendChild(cellEl);
          // Apply per-cell background color
          const CELL_BG2 = { blue:'rgba(37,99,235,.22)', green:'rgba(22,163,74,.22)', yellow:'rgba(217,119,6,.22)', red:'rgba(220,38,38,.22)', purple:'rgba(147,51,234,.22)', orange:'rgba(234,88,12,.22)', pink:'rgba(219,39,119,.22)', teal:'rgba(13,148,136,.22)' };
          const cellCor = tabela.cellColors && tabela.cellColors[ri] && tabela.cellColors[ri][ci];
          if (cellCor && cellCor !== 'default' && CELL_BG2[cellCor]) td.style.background = CELL_BG2[cellCor];
          // Apply per-cell text style
          const cs = getCellStyle(tabela, ri, ci);
          if (cs && (cs.align || cs.bold || cs.color)) applyCellStyleTD(td, cs);
          tr.appendChild(td);
        });

        return tr;
      }

      // Render pinned rows first, then normal rows
      tabela.linhasFixas.forEach(ri => { const linha=tabela.linhas[ri]; if (!linha) return; tbody.appendChild(buildRow(linha,ri,true)); });
      rows.forEach(({ r: linha, i: ri }) => { if (tabela.linhasFixas.includes(ri)) return; tbody.appendChild(buildRow(linha,ri,false)); });
      table.appendChild(tbody);

      // Keyboard + paste shortcuts on wrapper
      const tblWrap = table.closest('.tbl-wrap');
      if (tblWrap && !tblWrap._kbBound) {
        tblWrap._kbBound=true; tblWrap.setAttribute('tabindex','-1');
        tblWrap.addEventListener('keydown', e => {
          if ((e.ctrlKey||e.metaKey)&&e.key==='c') { e.preventDefault(); copySelection(table,tabela); }
          if ((e.ctrlKey||e.metaKey)&&e.key==='x') { e.preventDefault(); snapshot(); cutSelection(table,tabela); }
          if ((e.ctrlKey||e.metaKey)&&e.key==='v') { e.preventDefault(); navigator.clipboard.readText().then(txt=>{ pasteToSelection(table,tabela,txt.split('\n').map(r=>r.split('\t')),true); }).catch(()=>{}); }
          if ((e.ctrlKey||e.metaKey)&&!e.shiftKey&&e.key.toLowerCase()==='z') { e.preventDefault(); undo(); }
          if ((e.ctrlKey||e.metaKey)&&(e.shiftKey&&e.key.toLowerCase()==='z'||e.key.toLowerCase()==='y')) { e.preventDefault(); redo(); }
          if (e.key==='Escape') { clearSelection(table,tabela); clearCut(table); }
          if (e.key==='Delete'&&selRange()) { e.preventDefault(); snapshot(); deleteSelection(table,tabela); }
        });
        tblWrap.addEventListener('paste', e => {
          e.preventDefault();
          const txt=(e.clipboardData||window.clipboardData).getData('text');
          if (!txt||!selState.anchor) return;
          pasteToSelection(table,tabela,txt.split('\n').map(r=>r.split('\t')),true);
        });
      }

      applySelectionStyles(table, tabela);
    }

    function focusTblCell(table, ri, ci) {
      const trs = Array.from(table.querySelectorAll('tbody tr'));
      if (trs[ri]) { const cells = trs[ri].querySelectorAll('.cell-input'); if (cells[ci]) cells[ci].focus(); }
    }

    /* ── EXCEL IMPORT / EXPORT ── */
    function abrirModalExcel(abaId, tabelaId) {
      const body = document.createElement('div');

      // ── Exportar ──
      const secExp = document.createElement('div'); secExp.style.cssText = 'margin-bottom:.85rem;';
      const expLbl = document.createElement('div'); expLbl.style.cssText = 'font-size:12px;color:var(--muted);margin-bottom:.5rem;font-weight:600;text-transform:uppercase;letter-spacing:.04em;';
      expLbl.textContent = 'Exportar';
      const expDesc = document.createElement('p'); expDesc.style.cssText = 'margin:0 0 .6rem;font-size:13px;color:var(--muted);line-height:1.5;';
      expDesc.textContent = 'Baixe a tabela ativa como arquivo Excel compatível (.xls).';
      const bExportXLS = document.createElement('button'); bExportXLS.className = 'btn primary'; bExportXLS.textContent = '⬇ Baixar Excel (.xls)';
      bExportXLS.style.cssText = 'width:100%;';
      bExportXLS.onclick = () => {
        const aba2 = abaId ? getAba(abaId) : getAbaAtiva();
        const tbl2 = tabelaId
          ? (aba2 && aba2.tabelas && aba2.tabelas.find(t => t.id === tabelaId))
          : (aba2 && aba2.tabelas && aba2.tabelas.find(t => t.id === aba2.tabelaAtivaId));
        if (!tbl2) { showToast('Nenhuma tabela ativa'); return; }
        const hdr = '<tr>' + tbl2.colunas.map((col, ci) => `<th>${col.nome || getColName(ci)}</th>`).join('') + '</tr>';
        const rows = tbl2.linhas.map(r => '<tr>' + tbl2.colunas.map((_, ci) => `<td>${r[ci] || ''}</td>`).join('') + '</tr>').join('');
        const xls = `<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40"><head><meta charset="UTF-8"><!--[if gte mso 9]><xml><x:ExcelWorkbook><x:ExcelWorksheets><x:ExcelWorksheet><x:Name>${tbl2.nome}</x:Name></x:ExcelWorksheet></x:ExcelWorksheets></x:ExcelWorkbook></xml><![endif]--></head><body><table>${hdr}${rows}</table></body></html>`;
        const blob = new Blob([xls], { type: 'application/vnd.ms-excel;charset=UTF-8' });
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
        a.download = (tbl2.nome || 'tabela') + '.xls'; a.click(); URL.revokeObjectURL(a.href);
        showToast('Exportado!'); closeModal();
      };
      secExp.appendChild(expLbl); secExp.appendChild(expDesc); secExp.appendChild(bExportXLS);

      // ── Separator ──
      const sep = document.createElement('div'); sep.style.cssText = 'height:1px;background:var(--border);margin:.85rem 0;';

      // ── Importar ──
      const secImp = document.createElement('div');
      const impLbl = document.createElement('div'); impLbl.style.cssText = 'font-size:12px;color:var(--muted);margin-bottom:.5rem;font-weight:600;text-transform:uppercase;letter-spacing:.04em;';
      impLbl.textContent = 'Importar';
      const impDesc = document.createElement('p'); impDesc.style.cssText = 'margin:0 0 .6rem;font-size:13px;color:var(--muted);line-height:1.5;';
      impDesc.textContent = 'Importe um arquivo .csv ou .tsv. Os dados criarão uma nova tabela na aba ativa.';
      const impLabel = document.createElement('label'); impLabel.className = 'btn'; impLabel.style.cssText = 'width:100%;display:flex;align-items:center;justify-content:center;gap:.4rem;cursor:pointer;box-sizing:border-box;';
      impLabel.textContent = '⬆ Escolher arquivo (.csv / .tsv)';
      const impInput = document.createElement('input'); impInput.type = 'file'; impInput.accept = '.csv,.tsv,.txt'; impInput.style.display = 'none';
      impInput.addEventListener('change', () => {
        const file = impInput.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = ev => {
          const text = ev.target.result;
          const lines = text.split(/\r?\n/).filter(l => l.trim());
          if (!lines.length) { showToast('Arquivo vazio'); return; }
          const sep2 = lines[0].includes('\t') ? '\t' : ',';
          const cols = lines[0].split(sep2).map((h, i) => ({ id: uid(), nome: h.replace(/^"|"$/g,'') || getColName(i) }));
          const rowData = lines.slice(1).map(l => { const cells = l.split(sep2).map(c => c.replace(/^"|"$/g,'')); while (cells.length < cols.length) cells.push(''); return cells.slice(0, cols.length); });
          const aba2 = getAbaAtiva();
          if (!aba2 || aba2.tipo !== 'tabela') { showToast('Selecione uma aba de tabela'); return; }
          snapshot();
          const novaTabela = { id: uid(), nome: file.name.replace(/\.[^.]+$/, ''), isDefault: false, colunas: cols, linhas: rowData, cor: 'default', sort: { col: null, dir: 'asc' }, filter: '', linhasColoridas: {}, linhasFixas: [], colWidths: {}, cellConfig: {}, cellColors: {}, cellStyle: {} };
          aba2.tabelas.push(novaTabela); aba2.tabelaAtivaId = novaTabela.id;
          salvar(); renderTableArea(aba2); closeModal(); showToast('Importado: ' + rowData.length + ' linha(s)');
        };
        reader.readAsText(file);

      impLabel.appendChild(impInput);
      secImp.appendChild(impLbl); secImp.appendChild(impDesc); secImp.appendChild(impLabel);

      body.appendChild(secExp); body.appendChild(sep); body.appendChild(secImp);
      const bClose = document.createElement('button'); bClose.className = 'btn'; bClose.textContent = 'Fechar'; bClose.onclick = closeModal;
      openModal('📊 Excel — Importar / Exportar', body, [bClose]);

    /* ── MODAL DE CONFIGURAÇÕES ── */
    function abrirModalConfig() {
      const body = document.createElement('div');

      const temaLbl = document.createElement('div'); temaLbl.style.cssText = 'font-size:12px;color:var(--muted);margin-bottom:.5rem;font-weight:600;text-transform:uppercase;letter-spacing:.04em;';

        if ((nome === 'Claro' && isLight) || (nome === 'Escuro' && !isLight)) b.classList.add('primary');

      // ── Exportar backup ──
      const expLbl = document.createElement('div'); expLbl.style.cssText = 'font-size:12px;color:var(--muted);margin-bottom:.5rem;font-weight:600;text-transform:uppercase;letter-spacing:.04em;';
      expLbl.textContent = 'Backup — Exportar';
      const expDesc = document.createElement('p'); expDesc.style.cssText = 'margin:0 0 .5rem;font-size:13px;color:var(--muted);line-height:1.5;';

            const handle = await window.showSaveFilePicker({ suggestedName: 'notas-export.json', types: [{ description: 'JSON File', accept: { 'application/json': ['.json'] } }] });

      };

      // ── Separator ──
      const sep2 = document.createElement('div'); sep2.style.cssText = 'height:1px;background:var(--border);margin:.75rem 0;';

      // ── Importar backup ──
      const impLbl = document.createElement('div'); impLbl.style.cssText = 'font-size:12px;color:var(--muted);margin-bottom:.5rem;font-weight:600;text-transform:uppercase;letter-spacing:.04em;';
      impLbl.textContent = 'Backup — Importar';
      const impDesc = document.createElement('p'); impDesc.style.cssText = 'margin:0 0 .5rem;font-size:13px;color:var(--muted);line-height:1.5;';
      impDesc.textContent = 'Restaura um backup JSON. Isso substituirá os dados atuais.';
      const impLabel = document.createElement('label'); impLabel.className = 'btn'; impLabel.style.cssText = 'width:100%;display:flex;align-items:center;justify-content:center;cursor:pointer;box-sizing:border-box;';
      impLabel.textContent = '⬆ Importar dados (.json)';
      const impInput = document.createElement('input'); impInput.type = 'file'; impInput.accept = 'application/json'; impInput.style.display = 'none';
      impInput.onchange = e => {
        const reader = new FileReader();
        reader.onload = ev => { try { const d = JSON.parse(ev.target.result); if (d && Array.isArray(d.abas)) { state = d; if (!state.config) state.config = {}; if (!state.abaAtiva && state.abas.length) state.abaAtiva = state.abas[0].id; render(); salvar(); closeModal(); showToast('Importado com sucesso'); } else throw new Error('Formato inválido'); } catch (err) { alert('Falha: ' + err.message); } };
        if (e.target.files[0]) reader.readAsText(e.target.files[0]); e.target.value = '';
      };
      impLabel.appendChild(impInput);

      body.appendChild(temaLbl); body.appendChild(temaRow);
      body.appendChild(sep1);
      body.appendChild(expLbl); body.appendChild(expDesc); body.appendChild(bExp);
      body.appendChild(sep2);

      const bClose = document.createElement('button'); bClose.className = 'btn'; bClose.textContent = 'Fechar'; bClose.onclick = closeModal;
      openModal('⚙ Configurações', body, [bClose]);

    function abrirLixeira() {

      if (!lx.length) {
        const em = document.createElement('p');
        em.style.cssText = 'text-align:center;color:var(--muted);padding:2rem 0;margin:0;';
        em.textContent = '🗑 A lixeira está vazia.';
        body.appendChild(em);
      } else {
        const list = document.createElement('div');
        list.style.cssText = 'display:flex;flex-direction:column;gap:.4rem;max-height:380px;overflow-y:auto;padding-right:2px;';
        lx.forEach((n, idx) => {
          const row = document.createElement('div');
          row.style.cssText = 'display:flex;align-items:center;gap:.5rem;padding:.55rem .65rem;border:1px solid var(--border);border-radius:8px;background:var(--surface-2);';
          const info = document.createElement('div'); info.style.flex = '1'; info.style.minWidth = '0';
          const title = document.createElement('strong');
          title.style.cssText = 'font-size:13px;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;';
          title.textContent = n.titulo || '(Sem título)';
          const sub = document.createElement('div');
          sub.style.cssText = 'font-size:11px;color:var(--muted);margin-top:2px;';
          sub.textContent = new Date(n._deletedAt).toLocaleString('pt-BR');
          info.appendChild(title); info.appendChild(sub);
          const bRestore = document.createElement('button'); bRestore.className = 'btn';
          bRestore.style.cssText = 'font-size:12px;padding:0 .65rem;height:28px;flex-shrink:0;white-space:nowrap;';
          bRestore.textContent = '↩ Restaurar';
          bRestore.onclick = () => {
            snapshot();
            const nota = { id: n.id, titulo: n.titulo, descricao: n.descricao, cor: n.cor };
            const aba = getAba(n._abaId);
            if (aba && aba.tipo === 'notas') {
              aba.notas.unshift(nota);
            } else {
              const fallback = state.abas.find(a => a.tipo === 'notas');
              if (!fallback) { showToast('Nenhuma aba de notas disponível'); return; }
              fallback.notas.unshift(nota);
            }
            state.lixeira.splice(idx, 1);
            render(); salvar(); closeModal(); atualizarBadgeLixeira();
            showToast('✓ Nota restaurada!');
          };
          const bPerm = document.createElement('button'); bPerm.className = 'btn';
          bPerm.style.cssText = 'font-size:12px;padding:0 .65rem;height:28px;flex-shrink:0;background:rgba(239,68,68,.15);color:#ef4444;border-color:rgba(239,68,68,.3);white-space:nowrap;';
          bPerm.textContent = '✕';  bPerm.title = 'Excluir permanentemente';
          bPerm.onclick = () => {
            if (!confirm('Excluir esta nota permanentemente? Isso não pode ser desfeito.')) return;
            state.lixeira.splice(idx, 1); salvar(); closeModal(); abrirLixeira(); atualizarBadgeLixeira();
          };
          row.appendChild(info); row.appendChild(bRestore); row.appendChild(bPerm);
          list.appendChild(row);
        });
        body.appendChild(list);
        const bEmpty = document.createElement('button'); bEmpty.className = 'btn';
        bEmpty.style.cssText = 'margin-top:.75rem;background:rgba(239,68,68,.12);color:#ef4444;border-color:rgba(239,68,68,.3);width:100%;';
        bEmpty.textContent = '🗑 Esvaziar Lixeira';
        bEmpty.onclick = () => {
          if (!confirm('Excluir TODAS as notas da lixeira permanentemente?')) return;
          state.lixeira = []; salvar(); closeModal(); atualizarBadgeLixeira(); showToast('Lixeira esvaziada');
        };
        body.appendChild(bEmpty);
      }
      const btnClose = document.createElement('button'); btnClose.className = 'btn'; btnClose.textContent = 'Fechar'; btnClose.onclick = closeModal;
      openModal('🗑 Lixeira de Notas (' + lx.length + ')', body, [btnClose]);
    }

    /* ── GLOBAL Ctrl+Z / Ctrl+Y (outside of text inputs, let native undo work inside them) ── */
    document.addEventListener('keydown', e => {
      const tag = document.activeElement ? document.activeElement.tagName : '';
      if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
      if ((e.ctrlKey||e.metaKey) && !e.shiftKey && e.key.toLowerCase() === 'z') { e.preventDefault(); undo(); }
      if ((e.ctrlKey||e.metaKey) && (e.shiftKey && e.key.toLowerCase() === 'z' || e.key.toLowerCase() === 'y')) { e.preventDefault(); redo(); }
    });
    render();
  </script>
</body>

</html>
